<script>
const SLA_BOUND = { P1: true, P2: true, P3: false, P4: false };
const STATUS = {
  P1: { color: 'var(--status-critical)', label: 'P1 · Critical (SLA)' },
  P2: { color: 'var(--status-serious)',  label: 'P2 · Serious (SLA)' },
  P3: { color: 'var(--status-warning)',  label: 'P3 · Warning' },
  P4: { color: 'var(--status-good)',     label: 'P4 · Minor' },
};
const SEV_ORDER = ['P1','P2','P3','P4'];
const SEV_RANK = { P1: 1, P2: 2, P3: 3, P4: 4 };
const HEALTH_META = {
  'Healthy': { color: 'var(--status-good)', label: 'Healthy' },
  'Low Activity': { color: 'var(--text-muted)', label: 'Low activity' },
};
const fmt = (n) => (n ?? 0).toLocaleString('en-US');
const fmt1 = (n) => (n ?? 0).toLocaleString('en-US', { maximumFractionDigits: 1 });
const esc = (s) => (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function parseDurationHours(s) {
  if (!s || s === 'Open') return null;
  let m = /^(\d+)d (\d+)h$/.exec(s);
  if (m) return parseInt(m[1]) * 24 + parseInt(m[2]);
  m = /^(\d+)h$/.exec(s);
  if (m) return parseInt(m[1]);
  m = /^(\d+)m$/.exec(s);
  if (m) return parseInt(m[1]) / 60;
  return null;
}
function sevKey(s) { return 'P' + (s || '').trim().split(' ')[1]; }

// ---------- Tooltip ----------
const tt = document.getElementById('tooltip');
function showTooltip(evt, title, listHtml) {
  tt.innerHTML = '<div class="tt-title">' + title + '</div>' + (listHtml ? '<div class="tt-list">' + listHtml + '</div>' : '');
  tt.classList.add('show');
  moveTooltip(evt);
}
function moveTooltip(evt) {
  const pad = 16;
  let x = evt.clientX + pad, y = evt.clientY + pad;
  const rect = tt.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - 8) x = evt.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight - 8) y = evt.clientY - rect.height - pad;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function hideTooltip() { tt.classList.remove('show'); }
function wireTooltips(root) {
  root.querySelectorAll('[data-tt-title]').forEach(row => {
    row.addEventListener('mouseenter', (e) => showTooltip(e, row.dataset.ttTitle, row.dataset.ttList));
    row.addEventListener('mousemove', moveTooltip);
    row.addEventListener('mouseleave', hideTooltip);
  });
}

// ---------- Data loading ----------
async function fetchAccountFileList() {
  const res = await fetch('accounts/', { cache: 'no-cache' });
  if (!res.ok) throw new Error('Cannot list accounts/ (HTTP ' + res.status + ')');
  const html = await res.text();
  const files = [...html.matchAll(/href="([^"]+\.json)"/g)].map(m => decodeURIComponent(m[1]));
  if (!files.length) throw new Error('accounts/ has no .json files');
  return files.sort();
}
async function fetchAllAccounts() {
  const files = await fetchAccountFileList();
  const accounts = await Promise.all(files.map(async f => {
    const r = await fetch('accounts/' + f, { cache: 'no-cache' });
    const data = await r.json();
    data._file = f;
    return data;
  }));
  return accounts;
}

// ---------- Per-account computed view ----------
function computeAccountStats(d) {
  const sr = d.sourceReview || {};
  const tickets = (sr.ticketDetail || []).map(row => {
    const opened = sevKey(row.openedAs), final = sevKey(row.severity);
    return {
      ...row, openedSev: opened, finalSev: final,
      hours: parseDurationHours(row.duration),
      reclassified: opened !== final,
      direction: SEV_RANK[final] > SEV_RANK[opened] ? 'downgraded' : (SEV_RANK[final] < SEV_RANK[opened] ? 'upgraded' : 'none'),
      // Not in the source data yet — left null so the SLA-breach sort/column has
      // something to key off once real breach metrics/thresholds are supplied.
      slaBreach: row.slaBreach ?? null,
    };
  });
  const openedTotals = { P1:0,P2:0,P3:0,P4:0 }, finalTotals = { P1:0,P2:0,P3:0,P4:0 };
  tickets.forEach(t => { openedTotals[t.openedSev]++; finalTotals[t.finalSev]++; });
  const resBySev = { P1:[],P2:[],P3:[],P4:[] };
  tickets.forEach(t => { if (t.hours != null && t.status === 'Closed') resBySev[t.finalSev].push(t.hours); });
  const resStats = {};
  SEV_ORDER.forEach(k => {
    const vals = resBySev[k];
    resStats[k] = vals.length ? {
      count: vals.length,
      avg: vals.reduce((a,b)=>a+b,0) / vals.length,
      max: Math.max(...vals),
    } : { count: 0 };
  });
  const reclassified = tickets.filter(t => t.reclassified);
  return { tickets, openedTotals, finalTotals, resStats, reclassifiedCount: reclassified.length };
}

// ---------- Portfolio aggregation ----------
function computePortfolio(accounts) {
  const list = accounts.map(d => {
    const sr = d.sourceReview || {};
    const av = computeAccountStats(d);
    return {
      file: d._file, name: d.customer.name,
      total: sr.ticketCounts?.total ?? 0, open: sr.ticketCounts?.open ?? 0, closed: sr.ticketCounts?.closed ?? 0,
      openedAs: av.openedTotals, finalSeverity: av.finalTotals,
      health: d.health?.status ?? 'Unknown',
      _stats: av, _raw: d,
    };
  });
  const portfolioTotal = list.reduce((s,a) => s + a.total, 0);
  const portfolioOpen = list.reduce((s,a) => s + a.open, 0);
  const portfolioClosed = list.reduce((s,a) => s + a.closed, 0);
  const openedAsTotals = { P1:0,P2:0,P3:0,P4:0 }, finalSeverityTotals = { P1:0,P2:0,P3:0,P4:0 };
  list.forEach(a => SEV_ORDER.forEach(k => { openedAsTotals[k] += a.openedAs[k]; finalSeverityTotals[k] += a.finalSeverity[k]; }));
  const healthCounts = {};
  list.forEach(a => { healthCounts[a.health] = (healthCounts[a.health] || 0) + 1; });

  const allTickets = [];
  list.forEach(a => a._stats.tickets.forEach(t => allTickets.push({ ...t, account: a.name, file: a.file })));

  const resBySev = { P1:[],P2:[],P3:[],P4:[] };
  allTickets.forEach(t => { if (t.hours != null && t.status === 'Closed') resBySev[t.finalSev].push(t); });
  const resolutionStats = {};
  SEV_ORDER.forEach(k => {
    const vals = resBySev[k].map(t => t.hours);
    resolutionStats[k] = vals.length ? {
      count: vals.length,
      avg_hours: vals.reduce((a,b)=>a+b,0) / vals.length,
      median_hours: [...vals].sort((a,b)=>a-b)[Math.floor(vals.length/2)],
      max_hours: Math.max(...vals),
    } : { count: 0, avg_hours: null, median_hours: null, max_hours: null };
  });

  const reclass = allTickets.filter(t => t.reclassified);
  const downgraded = reclass.filter(t => t.direction === 'downgraded');
  const upgraded = reclass.filter(t => t.direction === 'upgraded');
  const p1Opened = allTickets.filter(t => t.openedSev === 'P1');
  const p1StillP1 = p1Opened.filter(t => t.finalSev === 'P1');

  const openTickets = allTickets.filter(t => t.status === 'Open');
  const longestResolutions = allTickets.filter(t => t.hours != null && t.status === 'Closed')
    .sort((a,b) => b.hours - a.hours).slice(0, 10);

  const BUCKETS = [
    ['Upgrade / Migration / Lifecycle', ['upgrad','migrat','lifecycle','version']],
    ['License / Procurement', ['licens','procure','fulfillment']],
    ['Stability / Reliability', ['stabilit','reliab','health','resource exhaust','crash']],
    ['Storage / Disk / Filesystem', ['storage','disk','filesystem','permission']],
    ['Account / Access / Identity', ['account admin','access manage','identity','onboard','personnel']],
    ['Networking', ['network','interlock','node integration','orchestration']],
    ['Certificate Management', ['certificat']],
  ];
  const themeBuckets = BUCKETS.map(([label, kws]) => {
    const accs = list.filter(a => {
      const text = (a._raw.sourceReview?.recurringThemes || []).join(' ').toLowerCase();
      return kws.some(kw => text.includes(kw));
    }).map(a => a.name);
    return { label, accountCount: accs.length, accounts: accs.sort() };
  }).sort((a,b) => b.accountCount - a.accountCount);

  return {
    accounts: list.sort((a,b) => b.total - a.total),
    portfolio: { total: portfolioTotal, open: portfolioOpen, closed: portfolioClosed, openedAsTotals, finalSeverityTotals, healthCounts },
    resolutionStats,
    reclassification: { totalReclassified: reclass.length, downgraded: downgraded.length, upgraded: upgraded.length, p1OpenedCount: p1Opened.length, p1StillP1Count: p1StillP1.length },
    openTickets, longestResolutions, themeBuckets,
  };
}

// ---------- Shared render helpers ----------
function sevBarListHtml(totals) {
  const max = Math.max(...SEV_ORDER.map(k => totals[k]), 1);
  return SEV_ORDER.map(k => {
    const v = totals[k];
    const pct = Math.max((v / max) * 100, v > 0 ? 2 : 0);
    return '<div class="bar-row">' +
      '<div class="bar-row-label"><span class="sev-dot" style="background:' + STATUS[k].color + '"></span>' + STATUS[k].label + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%; background:' + STATUS[k].color + '"></div></div>' +
      '<div class="bar-value">' + fmt(v) + '</div></div>';
  }).join('');
}
function sevStackHtml(final) {
  const total = SEV_ORDER.reduce((s,k) => s + final[k], 0) || 1;
  return '<div class="mini-stack">' + SEV_ORDER.map(k => {
    const w = (final[k] / total) * 100;
    return w > 0 ? '<span style="width:' + w + '%; background:' + STATUS[k].color + '" title="' + STATUS[k].label + ': ' + final[k] + '"></span>' : '';
  }).join('') + '</div>';
}
function healthChipHtml(health) {
  const hm = HEALTH_META[health] || { color: 'var(--text-muted)', label: health };
  return '<span class="health-chip"><span class="health-dot" style="background:' + hm.color + '"></span>' + hm.label + '</span>';
}
function resBarListHtml(resStats) {
  const maxAvg = Math.max(...SEV_ORDER.map(k => resStats[k].avg_hours || resStats[k].avg || 0));
  return SEV_ORDER.map(k => {
    const r = resStats[k];
    const avg = r.avg_hours ?? r.avg;
    if (!r.count) {
      return '<div class="bar-row"><div class="bar-row-label"><span class="sev-dot" style="background:' + STATUS[k].color + '"></span>' + STATUS[k].label + '</div><div class="bar-track"></div><div class="bar-value">no closed cases</div></div>';
    }
    const pct = Math.max((avg / maxAvg) * 100, 2);
    const avgDays = avg / 24;
    return '<div class="bar-row"><div class="bar-row-label"><span class="sev-dot" style="background:' + STATUS[k].color + '"></span>' + STATUS[k].label + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%; background:' + STATUS[k].color + '"></div></div>' +
      '<div class="bar-value">' + fmt1(avgDays) + 'd avg</div></div>';
  }).join('');
}
function daysAge(created, asOf) {
  const c = new Date(created + 'T00:00:00Z'), a = asOf ? new Date(asOf) : new Date(created);
  return Math.max(0, Math.round((a - c) / 86400000));
}

function wireSortableTable(tableId, rows, rowRenderFn, defaultKey, defaultDir) {
  const table = document.getElementById(tableId);
  let sortState = { key: defaultKey, dir: defaultDir };
  function render() {
    const sorted = [...rows].sort((a,b) => {
      let av = a[sortState.key], bv = b[sortState.key];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'string') return av.localeCompare(bv) * sortState.dir;
      return (av - bv) * sortState.dir;
    });
    table.querySelector('tbody').innerHTML = sorted.map(rowRenderFn).join('');
    table.querySelectorAll('th[data-sort]').forEach(th => {
      th.classList.toggle('sorted', th.dataset.sort === sortState.key);
      const arrow = th.querySelector('.arrow');
      if (arrow) arrow.textContent = (th.dataset.sort === sortState.key && sortState.dir === 1) ? '▴' : '▾';
    });
  }
  table.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      sortState.dir = (sortState.key === key) ? -sortState.dir : -1;
      sortState.key = key;
      render();
    });
  });
  render();
}

// ---------- Router ----------
function showState(msg) {
  document.getElementById('app').innerHTML = '<div class="state-msg">' + msg + '</div>';
}
let cachedAccounts = null;
async function route() {
  const hash = location.hash.slice(1);
  try {
    if (hash.startsWith('account/')) {
      const file = decodeURIComponent(hash.slice('account/'.length));
      showState('Loading account…');
      const res = await fetch('accounts/' + file, { cache: 'no-cache' });
      if (!res.ok) throw new Error('Could not load ' + file);
      const data = await res.json();
      renderAccountDetail(data);
    } else {
      showState('Loading portfolio — reading accounts/*.json…');
      if (!cachedAccounts) cachedAccounts = await fetchAllAccounts();
      renderPortfolio(computePortfolio(cachedAccounts));
    }
    window.scrollTo(0, 0);
  } catch (err) {
    showState(
      '<strong>Could not load data.</strong><br><br>' + esc(err.message) + '<br><br>' +
      'This app reads <code>accounts/*.json</code> directly and needs a directory listing to discover them — serve this folder with <code>python3 -m http.server</code> (same as the QBR Configurator), not by opening the file directly.'
    );
  }
}
window.addEventListener('hashchange', () => { cachedAccounts = cachedAccounts; route(); });
route();
</script>
