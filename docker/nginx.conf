server {
  listen 8080 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Allow directory listing (helpful when navigating to /accounts/)
  autoindex on;

  # No client-side caching — TAMs editing files want immediate feedback
  add_header Cache-Control "no-store, no-cache, must-revalidate";
  add_header Pragma "no-cache";

  # Don't leak nginx version
  server_tokens off;

  # Block any accidental phone-home: nginx itself never proxies upstream
  # in this config. The HTML also makes no external fetches (fonts are
  # local; data is local). To be extra safe, run with `network_mode:none`
  # in docker-compose.

  # nginx:alpine ships mime.types with .html, .json, .css, .js, .svg, .woff2 etc.
  # already mapped. Do NOT add a `types { ... }` block here — it REPLACES the
  # whole table and makes .html files download instead of render.

  location / {
    try_files $uri $uri/ =404;
  }

  # Don't serve hidden files
  location ~ /\. {
    deny all;
  }
}
