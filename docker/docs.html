<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Docs — Mirantis QBR</title>
  <link rel="stylesheet" href="./assets/fonts.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Lato', -apple-system, system-ui, sans-serif;
      background: #0E1A2E;
      color: #C8D0E0;
      min-height: 100vh;
    }
    .grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,201,176,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,201,176,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(14,26,46,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid #1F2A44;
      padding: 14px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar svg { flex-shrink: 0; }
    .topbar .brand {
      font-family: 'Overpass', system-ui, sans-serif;
      font-weight: 800; font-size: 16px; color: white;
      letter-spacing: 2px;
    }
    .topbar .sep { width: 1px; height: 18px; background: #3A4661; }
    .topbar .section-name {
      font-family: 'Overpass', system-ui, sans-serif;
      font-weight: 400; font-size: 14px; color: #7E8CA8;
      letter-spacing: 2px;
    }
    .topbar nav { display: flex; gap: 8px; }
    .topbar nav a {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: #7E8CA8; text-decoration: none; letter-spacing: 1px;
      padding: 6px 14px; border: 1px solid #2A3A55;
      transition: all 0.15s;
    }
    .topbar nav a:hover { border-color: #00C9B0; color: #00C9B0; }
    .topbar nav a.active { background: rgba(0,201,176,0.12); border-color: #00C9B0; color: #00C9B0; }
    .topbar nav a.back {
      background: rgba(0,201,176,0.08); border-color: #00C9B0; color: #00C9B0;
      font-family: 'Overpass', system-ui, sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 0.5px;
    }
    .content {
      position: relative; z-index: 1;
      max-width: 820px; margin: 0 auto;
      padding: 48px 40px 120px;
    }
    /* Markdown rendering */
    .content h1 {
      font-family: 'Overpass', system-ui, sans-serif;
      font-weight: 800; font-size: 48px; color: white;
      letter-spacing: -1px; line-height: 1.1;
      margin: 0 0 8px; padding-bottom: 20px;
      border-bottom: 2px solid #1F2A44;
    }
    .content h2 {
      font-family: 'Overpass', system-ui, sans-serif;
      font-weight: 700; font-size: 28px; color: white;
      margin: 48px 0 12px; padding-top: 24px;
      border-top: 1px solid #1F2A44;
    }
    .content h2:first-of-type { border-top: none; padding-top: 0; }
    .content h3 {
      font-family: 'Overpass', system-ui, sans-serif;
      font-weight: 700; font-size: 20px; color: #00C9B0;
      margin: 32px 0 8px;
    }
    .content p { font-size: 16px; line-height: 1.65; margin: 12px 0; }
    .content strong { color: white; }
    .content em { color: #7E8CA8; }
    .content a { color: #00C9B0; text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content code {
      font-family: 'JetBrains Mono', monospace; font-size: 14px;
      background: rgba(0,201,176,0.08); color: #00C9B0;
      padding: 2px 6px; border-radius: 3px;
    }
    .content pre {
      background: #070D1A; border: 1px solid #1F2A44;
      padding: 20px; margin: 16px 0; overflow-x: auto;
      border-radius: 4px;
    }
    .content pre code {
      background: none; padding: 0; font-size: 13px;
      color: #C8D0E0; line-height: 1.6;
    }
    .content ul, .content ol {
      padding-left: 24px; margin: 12px 0;
    }
    .content li {
      font-size: 16px; line-height: 1.65; margin: 6px 0;
    }
    .content li code { font-size: 13px; }
    .content hr {
      border: none; border-top: 1px solid #1F2A44;
      margin: 32px 0;
    }
    .content blockquote {
      border-left: 3px solid #00C9B0;
      padding: 12px 20px; margin: 16px 0;
      background: rgba(0,201,176,0.06);
      color: #7E8CA8;
    }
    .content table {
      width: 100%; border-collapse: collapse; margin: 16px 0;
      font-size: 14px;
    }
    .content th {
      text-align: left; padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: #5C6B85; letter-spacing: 1.5px;
      border-bottom: 2px solid #1F2A44;
    }
    .content td {
      padding: 10px 14px; border-bottom: 1px solid #1F2A44;
      line-height: 1.5;
    }
    .content td code { font-size: 12px; }
    .loading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; color: #5C6B85; letter-spacing: 2px;
      padding: 80px 0; text-align: center;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="topbar">
    <div class="topbar-left">
      <svg width="28" height="18" viewBox="0 0 200 130" fill="none">
        <path d="M10 35 C 50 -10, 90 110, 140 60 S 175 30, 190 50" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>
        <path d="M10 95 C 50 140, 90 20, 140 70 S 175 100, 190 80" stroke="#E03546" stroke-width="14" stroke-linecap="round" fill="none"/>
      </svg>
      <span class="brand">MIRANTIS</span>
      <span class="sep"></span>
      <span class="section-name">DOCS</span>
    </div>
    <nav>
      <a href="?doc=LOCAL-SETUP" id="nav-setup">Setup</a>
      <a href="?doc=AUTOMATION" id="nav-automation">Automation</a>
      <a href="?doc=SERVICE-CONTRACT" id="nav-service">Service contract</a>
      <a href="./" class="back">← Back</a>
    </nav>
  </div>
  <div class="content" id="content">
    <div class="loading">LOADING…</div>
  </div>
  <script>
    const BASE = location.pathname.includes('/docker/') ? '../' : '/';
    const DOCS = {
      'LOCAL-SETUP':      { file: BASE + 'LOCAL-SETUP.md',      nav: 'nav-setup',      title: 'Local Setup' },
      'AUTOMATION':       { file: BASE + 'AUTOMATION.md',       nav: 'nav-automation', title: 'Automation' },
      'SERVICE-CONTRACT': { file: BASE + 'SERVICE-CONTRACT.md', nav: 'nav-service',    title: 'Service Contract' },
    };

    const params = new URLSearchParams(location.search);
    const key = params.get('doc') || 'LOCAL-SETUP';
    const doc = DOCS[key] || DOCS['LOCAL-SETUP'];

    document.title = doc.title + ' — Mirantis QBR';
    const active = document.getElementById(doc.nav);
    if (active) active.classList.add('active');

    function renderMarkdown(md) {
      let html = '';
      const lines = md.split('\n');
      let inCode = false, codeBuf = [], codeInfo = '';
      let inTable = false, tableBuf = [];
      let inList = false, listType = 'ul', listBuf = [];

      function flushList() {
        if (!listBuf.length) return;
        html += '<' + listType + '>' + listBuf.join('') + '</' + listType + '>';
        listBuf = []; inList = false;
      }
      function flushTable() {
        if (!tableBuf.length) return;
        html += '<table>';
        tableBuf.forEach((row, i) => {
          const cells = row.split('|').map(c => c.trim()).filter(Boolean);
          if (i === 1) return; // separator row
          const tag = i === 0 ? 'th' : 'td';
          html += '<tr>' + cells.map(c => '<' + tag + '>' + inline(c) + '</' + tag + '>').join('') + '</tr>';
        });
        html += '</table>';
        tableBuf = []; inTable = false;
      }

      function inline(s) {
        return s
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.startsWith('```')) {
          if (inCode) {
            html += '<pre><code>' + codeBuf.join('\n').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>';
            codeBuf = []; inCode = false;
          } else {
            flushList(); flushTable();
            codeInfo = line.slice(3).trim();
            inCode = true;
          }
          continue;
        }
        if (inCode) { codeBuf.push(line); continue; }

        if (line.match(/^\|.*\|/)) {
          flushList();
          inTable = true; tableBuf.push(line);
          continue;
        } else if (inTable) { flushTable(); }

        if (line.match(/^#{1,3}\s/)) {
          flushList();
          const level = line.match(/^(#+)/)[1].length;
          const text = line.replace(/^#+\s*/, '');
          html += '<h' + level + '>' + inline(text) + '</h' + level + '>';
          continue;
        }

        if (line.match(/^---+$/)) { flushList(); html += '<hr>'; continue; }

        const ulMatch = line.match(/^(\s*)[-*]\s+(.*)/);
        const olMatch = line.match(/^(\s*)\d+\.\s+(.*)/);
        if (ulMatch || olMatch) {
          if (!inList) { inList = true; listType = olMatch ? 'ol' : 'ul'; }
          const text = ulMatch ? ulMatch[2] : olMatch[2];
          listBuf.push('<li>' + inline(text) + '</li>');
          continue;
        }
        if (inList && line.trim() === '') { flushList(); }
        if (inList && line.trim() !== '') {
          listBuf[listBuf.length - 1] = listBuf[listBuf.length - 1].replace('</li>', ' ' + inline(line.trim()) + '</li>');
          continue;
        }

        if (line.trim() === '') { flushList(); continue; }

        flushList();
        html += '<p>' + inline(line) + '</p>';
      }
      flushList(); flushTable();
      if (inCode) {
        html += '<pre><code>' + codeBuf.join('\n').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>';
      }
      return html;
    }

    fetch(doc.file)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => { document.getElementById('content').innerHTML = renderMarkdown(md); })
      .catch(e => {
        document.getElementById('content').innerHTML =
          '<p style="color:#E03546;">Could not load <code>' + doc.file + '</code> — ' + e.message + '</p>';
      });
  </script>
</body>
</html>
